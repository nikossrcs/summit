name: Auto-Sign & Deploy IPA

on:
  schedule:
    # Runs every 6 hours — adjust as needed
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no new cert/IPA'
        required: false
        default: 'false'
  repository_dispatch:
    types: [new-cert, new-ipa]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CERT_REPO: "NovaDev404/NovaCerts"
  IPA_REPO: "nyasami/ksign"
  ZSIGN_VERSION: "0.9"
  APP_NAME: "KSign"
  BUNDLE_ID: "com.nyasami.ksign"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      cert_folder: ${{ steps.check.outputs.cert_folder }}
      ipa_url: ${{ steps.check.outputs.ipa_url }}
      ipa_version: ${{ steps.check.outputs.ipa_version }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests

      - name: Check for new cert & IPA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CERT_REPO_PAT: ${{ secrets.CERT_REPO_PAT }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          python scripts/check_updates.py

      - name: Cache state
        uses: actions/cache@v4
        with:
          path: .state
          key: build-state-${{ steps.check.outputs.cert_folder }}-${{ steps.check.outputs.ipa_version }}

  sign-and-deploy:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests Pillow

      # ── 1. Install zsign ─────────────────────────────────────────────────────
      - name: Install zsign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libssl-dev libminizip-dev zlib1g-dev cmake g++ \
            git openssl unzip curl jq

          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cd /tmp/zsign
          cmake -B build -DCMAKE_BUILD_TYPE=Release .
          cmake --build build -j$(nproc)
          sudo cp build/zsign /usr/local/bin/zsign
          zsign --version || echo "zsign installed"

      # ── 2. Fetch latest cert from NovaCerts repo ─────────────────────────────
      - name: Fetch latest certificate bundle
        env:
          CERT_REPO_PAT: ${{ secrets.CERT_REPO_PAT }}
          CERT_FOLDER: ${{ needs.check-and-build.outputs.cert_folder }}
        run: |
          python scripts/fetch_cert.py

      # ── 3. Fetch latest KSign IPA ─────────────────────────────────────────────
      - name: Fetch latest KSign IPA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IPA_URL: ${{ needs.check-and-build.outputs.ipa_url }}
          IPA_VERSION: ${{ needs.check-and-build.outputs.ipa_version }}
        run: |
          python scripts/fetch_ipa.py

      # ── 4. Bundle cert into IPA for KSign pre-import ─────────────────────────
      - name: Bundle certificate into IPA
        run: |
          python scripts/bundle_cert.py

      # ── 5. Sign the IPA with zsign ────────────────────────────────────────────
      - name: Sign IPA
        run: |
          set -e

          P12_FILE=$(cat /tmp/build/p12_path.txt)
          MP_FILE=$(cat /tmp/build/mp_path.txt)
          PASSWORD=$(cat /tmp/build/cert_password.txt)
          IPA_FILE="/tmp/build/ksign_bundled.ipa"
          OUTPUT_IPA="/tmp/build/ksign_signed.ipa"

          echo "Signing with: $P12_FILE | $MP_FILE"

          zsign \
            -k "$P12_FILE" \
            -p "$PASSWORD" \
            -m "$MP_FILE" \
            -o "$OUTPUT_IPA" \
            -z 9 \
            "$IPA_FILE"

          echo "Signed IPA size: $(du -sh $OUTPUT_IPA)"

      # ── 6. Generate manifest.plist & index.html ───────────────────────────────
      - name: Generate deployment assets
        env:
          IPA_VERSION: ${{ needs.check-and-build.outputs.ipa_version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/generate_assets.py

      # ── 7. Deploy to gh-pages ─────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          publish_branch: gh-pages
          force_orphan: false
          keep_files: false
          commit_message: |
            🚀 Auto-deploy: KSign ${{ needs.check-and-build.outputs.ipa_version }}

      # ── 8. Save build state ───────────────────────────────────────────────────
      - name: Save build state
        run: |
          mkdir -p .state
          echo "${{ needs.check-and-build.outputs.cert_folder }}" > .state/last_cert
          echo "${{ needs.check-and-build.outputs.ipa_version }}" > .state/last_ipa_version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/
          git diff --staged --quiet || git commit -m "chore: update build state [skip ci]"
          git push

      - name: Summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA Version:** ${{ needs.check-and-build.outputs.ipa_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cert Folder:** ${{ needs.check-and-build.outputs.cert_folder }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OTA URL:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
